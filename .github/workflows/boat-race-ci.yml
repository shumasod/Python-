name: Boat Race AI - CI/CD

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "project/**"
      - ".github/workflows/boat-race-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "project/**"

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: boat-race-ai

jobs:
  # ============================================================
  # ジョブ1: リント・テスト
  # ============================================================
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: project/requirements.txt

      - name: 依存パッケージインストール
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx ruff

      - name: Ruff リント（構文・スタイルチェック）
        run: ruff check app/ scripts/ --ignore E501

      - name: テスト実行（カバレッジ付き）
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: カバレッジレポートをアップロード
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: project/coverage.xml
          flags: unittests

  # ============================================================
  # ジョブ2: Dockerビルド（main ブランチのみ）
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: project

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx セットアップ
        uses: docker/setup-buildx-action@v3

      - name: Docker イメージビルド（プッシュなし）
        uses: docker/build-push-action@v5
        with:
          context: project
          file: project/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # ジョブ3: ECRへのプッシュ（mainブランチ・タグ付きリリース時）
  # ============================================================
  deploy-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write   # OIDC 認証に必要
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: AWS 認証（OIDC）
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: ECR ログイン
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker ビルド & ECR プッシュ
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: boat-race-ai-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG project/
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: ECS サービス更新（ローリングデプロイ）
        env:
          CLUSTER: boat-race-ai-cluster
          SERVICE: boat-race-ai-api-service
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region ap-northeast-1

  # ============================================================
  # ジョブ4: Terraform Validate（PRのみ）
  # ============================================================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: project/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: terraform init（バックエンドなし）
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: terraform fmt チェック
        run: terraform fmt -check -recursive
