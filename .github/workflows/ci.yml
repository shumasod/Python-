name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi uvicorn pydantic pydantic-settings \
            numpy scipy structlog httpx anyio \
            boto3 botocore \
            pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        env:
          SLACK_WEBHOOK_URL: ""
          AWS_DEFAULT_REGION: ap-northeast-1
          # CI 用ダミー認証情報（実際の AWS API は呼び出さない）
          AWS_ACCESS_KEY_ID: "testing"
          AWS_SECRET_ACCESS_KEY: "testing"
        run: |
          python -m pytest tests/ \
            --cov=rds_analyzer \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check rds_analyzer/ tests/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Run ruff format check
        run: ruff format --check rds_analyzer/ tests/
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.rds-analyzer
          push: false
          tags: rds-analyzer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
