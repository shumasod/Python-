version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.rds-analyzer
    container_name: rds-analyzer-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./rds_analyzer:/app/rds_analyzer:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: rds-analyzer-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # 開発時は dev サービスを使う: docker compose up dev
  dev:
    image: node:20-alpine
    container_name: rds-analyzer-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend/rds-dashboard:/app
      - /app/node_modules
    profiles:
      - dev
    restart: unless-stopped

volumes: {}
