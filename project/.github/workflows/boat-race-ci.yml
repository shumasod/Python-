name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: boat-race-api
  ECS_CLUSTER: boat-race-cluster
  ECS_SERVICE: boat-race-api

jobs:
  # ============================================================
  # 1. Lint + Test
  # ============================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff httpx scipy

      - name: Ruff lint
        run: ruff check app/ scripts/ tests/

      - name: Ruff format check
        run: ruff format --check app/ scripts/ tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            -m "not slow" \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: project/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ============================================================
  # 2. Docker Build（main ブランチのみ）
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (cache check)
        uses: docker/build-push-action@v5
        with:
          context: project
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: boat-race-api:${{ github.sha }}

  # ============================================================
  # 3. ECR Push + ECS Deploy（main ブランチのみ）
  # ============================================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    permissions:
      id-token: write   # OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: project
          target: production
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Update ECS service
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

          # 現行タスク定義を取得して image だけ差し替え
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition boat-race-api \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE
             | del(.taskDefinitionArn, .revision, .status,
                   .requiresAttributes, .compatibilities,
                   .registeredAt, .registeredBy)')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "$NEW_TASK_ARN" \
            --force-new-deployment

      - name: Wait for ECS rollout
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"
          echo "ECS ローリングデプロイ完了"

  # ============================================================
  # 4. Terraform Validate（PR のみ）
  # ============================================================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: project/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # ============================================================
  # 5. 週次 モデル再学習（スケジュール実行）
  # ============================================================
  weekly-retrain:
    name: Weekly Model Retrain
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    defaults:
      run:
        working-directory: project

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model training (sample data)
        run: python scripts/train_model.py --use-sample --n-races 3000

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.run_id }}
          path: project/models/
          retention-days: 30

# スケジュール追加トリガー（毎週月曜 02:00 UTC）
# on.schedule は on: のトップレベルに移動する必要があるため上部 on: ブロックに追記してください:
# schedule:
#   - cron: "0 2 * * 1"
