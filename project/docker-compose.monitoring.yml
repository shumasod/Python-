# ============================================================
# 監視スタック: Prometheus + Grafana
# 使用方法:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#   Grafana: http://localhost:3000  (admin/admin)
#   Prometheus: http://localhost:9090
# ============================================================
version: "3.9"

services:
  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: boat-race-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:10.4.2
    container_name: boat-race-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/boat_race.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---- Node Exporter（ホストメトリクス）----
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: boat-race-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

  # ---- Redis Exporter ----
  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    container_name: boat-race-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
