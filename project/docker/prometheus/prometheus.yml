global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI アプリ
  - job_name: "boat-race-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # Node Exporter（ホストメトリクス）
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Redis Exporter
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Prometheus 自身
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
