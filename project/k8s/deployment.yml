apiVersion: apps/v1
kind: Deployment
metadata:
  name: boat-race-api
  namespace: boat-race
  labels:
    app: boat-race-api
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: boat-race-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     # ゼロダウンタイム更新
  template:
    metadata:
      labels:
        app: boat-race-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: YOUR_ECR_URI/boat-race-api:latest   # CI/CDで自動置換
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: boat-race-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boat-race-secret
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: boat-race-secret
                  key: DB_HOST
            - name: API_KEY_HASH
              valueFrom:
                secretKeyRef:
                  name: boat-race-secret
                  key: API_KEY_HASH
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: models-volume
              mountPath: /app/models
            - name: data-volume
              mountPath: /app/data
      volumes:
        - name: models-volume
          persistentVolumeClaim:
            claimName: models-pvc
        - name: data-volume
          persistentVolumeClaim:
            claimName: data-pvc
