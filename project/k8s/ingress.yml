apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: boat-race-ingress
  namespace: boat-race
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # レートリミット: 10 req/s per IP
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # タイムアウト設定
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    # CORS（必要に応じて有効化）
    # nginx.ingress.kubernetes.io/enable-cors: "true"
    # nginx.ingress.kubernetes.io/cors-allow-origin: "https://yourdomain.com"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.boat-race-ai.example.com
      secretName: boat-race-tls   # cert-manager で自動発行
  rules:
    - host: api.boat-race-ai.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: boat-race-api
                port:
                  number: 80
