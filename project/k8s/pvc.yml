apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: boat-race
spec:
  accessModes:
    - ReadWriteMany   # 複数 Pod から同時アクセス（EFS / NFS 等）
  resources:
    requests:
      storage: 5Gi
  storageClassName: efs-sc   # AWS EFS CSI driver を使用
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: boat-race
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: efs-sc
