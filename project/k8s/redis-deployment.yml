apiVersion: apps/v1
kind: Deployment
metadata:
  name: boat-race-redis
  namespace: boat-race
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boat-race-redis
  template:
    metadata:
      labels:
        app: boat-race-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args:
            - redis-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""   # AOF 無効（キャッシュ用途なので永続化不要）
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
